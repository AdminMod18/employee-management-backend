services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: employee-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: Oracle123
      APP_USER: empleados
      APP_USER_PASSWORD: empleados
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
